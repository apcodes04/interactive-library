<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acadbyte — Interactive Diagrams</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="top-nav">
    <div class="brand">Acadbyte <span class="brand-sub">Interactive Diagrams</span></div>
    <input type="text" id="search" class="search-input" placeholder="Search modules... (Ctrl K)">
    <div class="tier-filters" id="tierFilters">
      <button class="tier-btn active" data-tier="All">All</button>
      <button class="tier-btn" data-tier="Beginner">Beginner</button>
      <button class="tier-btn" data-tier="Intermediate">Intermediate</button>
      <button class="tier-btn" data-tier="Advanced">Advanced</button>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
      <svg id="themeIconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      <svg id="themeIconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
    </button>
  </header>

  <main id="tiers"></main>

  <div class="preview-overlay" id="previewOverlay">
    <div class="preview-panel">
      <div class="preview-header">
        <span id="previewTitle">Module</span>
        <div class="preview-controls">
          <button class="view-btn active" id="viewDesktop">Desktop</button>
          <button class="view-btn" id="viewMobile">Mobile</button>
          <button class="close-btn" id="closePreview" aria-label="Close preview">&times;</button>
        </div>
      </div>
      <div class="preview-frame-wrap" id="frameWrap">
        <iframe id="previewFrame" title="Module preview"></iframe>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
