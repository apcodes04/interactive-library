<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acadbyte — Interactive Diagrams (Top 50 ML/LLM Modules)</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <div class="header-inner">
      <h1>Acadbyte — Interactive Diagrams</h1>
      <div class="header-controls">
        <input type="text" id="searchInput" placeholder="Search 50 modules by title..." aria-label="Search modules">
        <div class="tier-filters" id="tierFilters">
          <button class="filter-btn active" data-tier="all">All</button>
          <button class="filter-btn" data-tier="Beginner">Beginner</button>
          <button class="filter-btn" data-tier="Intermediate">Intermediate</button>
          <button class="filter-btn" data-tier="Advanced">Advanced</button>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
          <svg id="themeIconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          <svg id="themeIconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <main class="container" id="mainContainer"></main>

  <div class="preview-overlay" id="previewOverlay">
    <div class="preview-panel">
      <div class="preview-header">
        <h3 id="previewTitle">Module Title</h3>
        <div class="preview-actions">
          <div class="variant-toggle">
            <button class="variant-btn active" id="btnDesktop">Desktop</button>
            <button class="variant-btn" id="btnMobile">Mobile</button>
          </div>
          <button class="close-btn" id="btnClose" aria-label="Close preview">×</button>
        </div>
      </div>
      <div class="iframe-wrapper" id="iframeWrapper">
        <iframe id="previewIframe" src="" title="Module Preview"></iframe>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
