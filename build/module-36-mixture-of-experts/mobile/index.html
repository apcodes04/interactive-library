<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Module 36 - Mixture of Experts (Mobile)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <button class="theme-toggle" aria-label="Toggle theme">
      <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <div class="steps-panel">
      <h3>Steps to interact</h3>
      <ol>
        <li>Select a token button.</li>
        <li>Watch which 2 of 8 experts light up.</li>
      </ol>
    </div>
    
    <div class="controls">
      <button class="token-btn" data-experts="1,4">"the"</button>
      <button class="token-btn" data-experts="3,7">"photosynthesis"</button>
      <button class="token-btn" data-experts="2,5">"running"</button>
      <button class="token-btn" data-experts="6,8">"quantum"</button>
    </div>

    <div class="readout-box">
      Active experts: <span id="active-count">0</span>/8 (<span id="capacity-used">0</span>%)
    </div>

    <div class="svg-container">
      <svg viewBox="0 0 500 300" id="moe-svg">
        <!-- Lines -->
        <line x1="50" y1="150" x2="150" y2="150" class="path-line" id="path-in" />
        
        <g id="expert-lines">
          <line x1="150" y1="150" x2="350" y2="50" class="path-line" id="path-1" />
          <line x1="150" y1="150" x2="420" y2="80" class="path-line" id="path-2" />
          <line x1="150" y1="150" x2="450" y2="150" class="path-line" id="path-3" />
          <line x1="150" y1="150" x2="420" y2="220" class="path-line" id="path-4" />
          <line x1="150" y1="150" x2="350" y2="250" class="path-line" id="path-5" />
          <line x1="150" y1="150" x2="280" y2="220" class="path-line" id="path-6" />
          <line x1="150" y1="150" x2="250" y2="150" class="path-line" id="path-7" />
          <line x1="150" y1="150" x2="280" y2="80" class="path-line" id="path-8" />
        </g>

        <!-- Nodes -->
        <circle cx="50" cy="150" r="20" class="node input-node" />
        <text x="50" y="155" class="node-label">In</text>

        <rect x="120" y="120" width="60" height="60" rx="8" class="node router-node" />
        <text x="150" y="155" class="node-label">Router</text>

        <!-- Experts -->
        <g id="expert-nodes">
          <circle cx="350" cy="50" r="20" class="node expert-node" id="expert-1" />
          <text x="350" y="55" class="node-label">E1</text>
          
          <circle cx="420" cy="80" r="20" class="node expert-node" id="expert-2" />
          <text x="420" y="85" class="node-label">E2</text>
          
          <circle cx="450" cy="150" r="20" class="node expert-node" id="expert-3" />
          <text x="450" y="155" class="node-label">E3</text>
          
          <circle cx="420" cy="220" r="20" class="node expert-node" id="expert-4" />
          <text x="420" y="225" class="node-label">E4</text>
          
          <circle cx="350" cy="250" r="20" class="node expert-node" id="expert-5" />
          <text x="350" y="255" class="node-label">E5</text>
          
          <circle cx="280" cy="220" r="20" class="node expert-node" id="expert-6" />
          <text x="280" y="225" class="node-label">E6</text>
          
          <circle cx="250" cy="150" r="20" class="node expert-node" id="expert-7" />
          <text x="250" y="155" class="node-label">E7</text>
          
          <circle cx="280" cy="80" r="20" class="node expert-node" id="expert-8" />
          <text x="280" y="85" class="node-label">E8</text>
        </g>
        
        <!-- Animated Dot -->
        <circle cx="50" cy="150" r="6" class="dot" id="anim-dot" />
        <circle cx="150" cy="150" r="6" class="dot" id="anim-dot-a" />
        <circle cx="150" cy="150" r="6" class="dot" id="anim-dot-b" />
      </svg>
    </div>

    <div class="explain-panel" id="explain">See how the router assigns inputs to experts.</div>
    <div class="caption" id="caption">Every single token only ever lights up 2 of these 8 experts — the rest of the model's capacity sits completely idle for that token.</div>
  </div>
  <script src="script.js"></script>
</body>
</html>
