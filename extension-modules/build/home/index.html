<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acadbyte — Extension Modules (51–73)</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="home-header">
    <div class="header-main">
      <h1>Acadbyte — Extension Modules (51–73)</h1>
      <a href="../../build/home/index.html" class="back-link">&larr; Back to core 50-module course</a>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
      <svg id="themeIconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      <svg id="themeIconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
    </button>
  </header>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Search modules..." class="search-input">
    <div class="filter-group">
      <button class="filter-btn active" data-tier="All">All</button>
      <button class="filter-btn" data-tier="Beginner">Beginner</button>
      <button class="filter-btn" data-tier="Intermediate">Intermediate</button>
      <button class="filter-btn" data-tier="Advanced">Advanced</button>
    </div>
  </div>

  <main class="grid-container" id="gridContainer"></main>

  <!-- Preview Panel Modal -->
  <div class="modal-overlay" id="previewModal">
    <div class="modal-card">
      <div class="modal-header">
        <h3 id="modalTitle">Module Preview</h3>
        <div class="modal-controls">
          <div class="view-switch">
            <button class="switch-btn active" id="btnDeskView">Desktop</button>
            <button class="switch-btn" id="btnMobView">Mobile</button>
          </div>
          <button class="close-btn" id="modalClose">&times;</button>
        </div>
      </div>
      <div class="iframe-container" id="iframeWrap">
        <iframe id="previewIframe" src=""></iframe>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
